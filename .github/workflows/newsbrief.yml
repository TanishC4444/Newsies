name: Newsbrief Pipeline

on:
  schedule:
    - cron: "0 6 * * *"     # daily 6:00 UTC (midnight CST)
  workflow_dispatch:
    inputs:
      feed_url:
        description: "RSS feed URL (blank = default BBC ME)"
        required: false
        default: ""
      max_articles:
        description: "Max articles (0 = all)"
        required: false
        default: "10"
      skip_long:
        description: "Skip long summaries"
        required: false
        type: boolean
        default: false

env:
  MODEL_NAME: "mistral-7b-instruct-v0.3.Q5_K_M.gguf"
  MODEL_URL: "https://huggingface.co/TheBloke/Mistral-7B-Instruct-v0.3-GGUF/resolve/main/mistral-7b-instruct-v0.3.Q5_K_M.gguf"
  MODEL_DIR: "models"
  DEFAULT_FEED: "https://feeds.bbci.co.uk/news/world/middle_east/rss.xml"
  DEFAULT_SOURCE: "BBC Middle East"
  DEFAULT_CATEGORY: "Middle East"

jobs:
  newsbrief:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── PIP CACHE ─────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-v1
          restore-keys: pip-${{ runner.os }}-

      # ── INSTALL DEPS ──────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser playwright
          sudo apt-get update && sudo apt-get install -y libopenblas-dev
          CMAKE_ARGS="-DGGML_BLAS=ON -DGGML_BLAS_VENDOR=OpenBLAS" \
            pip install llama-cpp-python --no-cache-dir
          playwright install chromium
          playwright install-deps chromium

      # ── MODEL CACHE ───────────────────────────────────────────────────
      # ~5.1 GB cached after first run. GitHub allows 10 GB per repo.
      - name: Cache Mistral-7B model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.MODEL_DIR }}/${{ env.MODEL_NAME }}
          key: model-${{ env.MODEL_NAME }}

      # ── DOWNLOAD MODEL (cache miss only) ──────────────────────────────
      - name: Download Mistral-7B GGUF
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ env.MODEL_DIR }}
          echo "Downloading ${{ env.MODEL_NAME }}..."
          wget -q --show-progress \
            -O ${{ env.MODEL_DIR }}/${{ env.MODEL_NAME }} \
            ${{ env.MODEL_URL }}
          ls -lh ${{ env.MODEL_DIR }}/

      - name: Verify model
        run: ls -lh ${{ env.MODEL_DIR }}/${{ env.MODEL_NAME }}

      # ── RUN ────────────────────────────────────────────────────────────
      - name: Run newsbrief
        run: |
          FEED="${{ github.event.inputs.feed_url || env.DEFAULT_FEED }}"
          MAX="${{ github.event.inputs.max_articles || '10' }}"
          SKIP_LONG="${{ github.event.inputs.skip_long }}"

          CMD="python newsbrief.py \"$FEED\" \
            --source \"${{ env.DEFAULT_SOURCE }}\" \
            --category \"${{ env.DEFAULT_CATEGORY }}\" \
            --model ${{ env.MODEL_DIR }}/${{ env.MODEL_NAME }} \
            --ctx 8192 \
            --max $MAX \
            --json output/results.json \
            --text output/results.txt \
            --verbose"

          if [ "$SKIP_LONG" = "true" ]; then
            CMD="$CMD --no-long"
          fi

          mkdir -p output
          eval $CMD

      # ── UPLOAD RESULTS ────────────────────────────────────────────────
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: newsbrief-${{ github.run_number }}
          path: output/
          retention-days: 30

      # ── OPTIONAL: commit results back to repo ─────────────────────────
      # - name: Commit results
      #   run: |
      #     git config user.name "github-actions[bot]"
      #     git config user.email "github-actions[bot]@users.noreply.github.com"
      #     mkdir -p reports
      #     cp output/* reports/
      #     git add reports/
      #     git diff --staged --quiet || git commit -m "newsbrief $(date +%Y-%m-%d)"
      #     git push